{% extends "base.html" %} {% block title %}Reset Password - Time & Attendance
System{% endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header text-center">
        <h4><i class="fas fa-key"></i> Reset Password</h4>
      </div>
      <div class="card-body p-4">
        <form
          method="POST"
          action="{{ url_for('reset_password', token=token) }}"
        >
          <div class="mb-3">
            <label for="new_password" class="form-label">
              <i class="fas fa-lock"></i> New Password
            </label>
            <input
              type="password"
              class="form-control"
              id="new_password"
              name="new_password"
              required
              minlength="8"
              autofocus
            />
            <small class="form-text text-muted">
              Must be at least 8 characters with uppercase, lowercase, number,
              and special character
            </small>
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label">
              <i class="fas fa-check"></i> Confirm New Password
            </label>
            <input
              type="password"
              class="form-control"
              id="confirm_password"
              name="confirm_password"
              required
              minlength="8"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="fas fa-save"></i> Reset Password
          </button>
        </form>

        <hr class="my-4" />

        <div class="text-center">
          <a href="{{ url_for('login') }}" class="btn btn-link">
            <i class="fas fa-arrow-left"></i> Back to Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Password validation
  document.querySelector("form").addEventListener("submit", function (e) {
    const newPassword = document.getElementById("new_password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    if (newPassword !== confirmPassword) {
      e.preventDefault();
      alert("Passwords do not match!");
      return false;
    }

    // Check password strength
    const hasUpper = /[A-Z]/.test(newPassword);
    const hasLower = /[a-z]/.test(newPassword);
    const hasNumber = /[0-9]/.test(newPassword);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(newPassword);

    if (!hasUpper || !hasLower || !hasNumber || !hasSpecial) {
      e.preventDefault();
      alert(
        "Password must contain uppercase, lowercase, number, and special character!"
      );
      return false;
    }
  });
</script>
{% endblock %}
