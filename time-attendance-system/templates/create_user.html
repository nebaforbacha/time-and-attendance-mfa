{% extends "base.html" %} {% block title %}Create User{% endblock %} {% block
content %}
<h2 class="text-white mb-4">
  <i class="fas fa-user-plus"></i> Create New User
</h2>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><i class="fas fa-user"></i> User Details</div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              name="username"
              required
              minlength="4"
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              name="password"
              required
              minlength="8"
            />
            <small class="text-muted"
              >Min 8 chars, uppercase, lowercase, number, special char</small
            >
          </div>
          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name="is_admin"
              id="is_admin"
            />
            <label class="form-check-label" for="is_admin"
              >Grant Admin Privileges</label
            >
          </div>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-save"></i> Create User
          </button>
          <a href="{{ url_for('admin_users') }}" class="btn btn-secondary"
            >Cancel</a
          >
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
